services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-bmad}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bmad123}
      POSTGRES_DB: ${DB_NAME:-bmad_cem}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bmad}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
